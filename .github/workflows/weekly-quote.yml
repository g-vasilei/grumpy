name: Weekly Quote

# Runs every Friday at 9pm Athens time (UTC+2 winter / UTC+3 summer)
# Using 19:00 UTC which covers both (adjust if needed)
on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate quote image
        run: node scripts/generate-quote.mjs

      - name: Commit and push
        run: |
          git config user.name "grumpy-bot"
          git config user.email "bot@grumpy.gr"
          git add public/imgs/quotes/ public/imgs/story/ src/data/projects.json quotes-queue.json
          git diff --staged --quiet || git commit -m "chore: add weekly quote $(date +'%Y-%m-%d')"
          git push
